name: Publish to PyPI

# Publishes on a GitHub Release. Two ways to authenticate (pick one):
#
#  A) Trusted Publishing (recommended, no token in repo):
#     On PyPI -> your project -> Publishing -> add a GitHub publisher:
#       owner=monkrel  repo=kleinanzeigen-api  workflow=publish.yml  environment=pypi
#     Then this workflow uploads via OIDC. Keep the `permissions: id-token` block.
#
#  B) API token:
#     Add a repo secret PYPI_API_TOKEN, and replace the `with:` block of the
#     pypa/gh-action-pypi-publish step with:
#         with:
#           password: ${{ secrets.PYPI_API_TOKEN }}

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
